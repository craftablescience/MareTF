name: Build
on:
  push:
    branches: [mane]
  pull_request:
    branches: [mane]
  workflow_dispatch:
    # nothing here

env:
  BUILD_DIR: '${{github.workspace}}/build'

jobs:
  build-windows:
    strategy:
      matrix:
        build_type: [Debug, Release]
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -G "Ninja" -B "${{env.BUILD_DIR}}" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCPACK_GENERATOR=NSIS -DMARETF_USE_LTO=ON -DMARETF_BUILD_INSTALLER=ON

      - name: Build Binaries
        working-directory: '${{env.BUILD_DIR}}'
        run: cmake --build . --config ${{matrix.build_type}} -t maretf -- -j%NUMBER_OF_PROCESSORS%

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Windows-Standalone-msvc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/maretf.exe
          retention-days: 7

      - name: Create Installer
        working-directory: ${{env.BUILD_DIR}}
        run: cpack

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Windows-Installer-msvc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/MareTF-*-win64.exe
          retention-days: 7

      - name: Upload Standalone PDBs
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Windows-PDBs-msvc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/maretf.pdb
          retention-days: 7

  build-linux:
    strategy:
      matrix:
        build_type: [Debug, Release]
        cpack_generator: [DEB]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Necessary Packages
        run: sudo apt update && sudo apt install -y cmake build-essential ninja-build

      - name: Configure CMake
        run: cmake -G "Ninja" -B "${{env.BUILD_DIR}}" -DCMAKE_C_COMPILER="gcc" -DCMAKE_CXX_COMPILER="g++" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCPACK_GENERATOR=${{matrix.cpack_generator}} -DMARETF_USE_LTO=ON -DMARETF_BUILD_INSTALLER=ON

      - name: Build Binaries
        working-directory: '${{env.BUILD_DIR}}'
        run: cmake --build . --config ${{matrix.build_type}} -t maretf -- -j$(nproc)

      - name: Upload Standalone [cpack_generator:DEB]
        if: ${{matrix.cpack_generator == 'DEB'}}
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Linux-Standalone-gcc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/maretf
          retention-days: 7

      - name: Create Installer
        working-directory: ${{env.BUILD_DIR}}
        run: cpack

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: 'MareTF-Linux-${{matrix.cpack_generator}}-Installer-gcc-${{matrix.build_type}}'
          path: |
            ${{env.BUILD_DIR}}/MareTF-*-Linux.deb
          retention-days: 7

  deploy:
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = (await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{github.run_id}},
            })).data.artifacts;
            const filteredArtifacts = artifacts.filter(artifact => artifact.name.includes("Release"));
            console.log(`Found ${artifacts.length} artifacts - ${filteredArtifacts.length} qualify for upload.`);
            for (const artifact of filteredArtifacts) {
              console.log(`Downloading "${artifact.name}.zip"...`);
              let download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip',
              });
              let fs = require('fs');
              fs.writeFileSync(`${{github.workspace}}/${artifact.name}.zip`, Buffer.from(download.data));
            }
            console.log("Artifact download complete!");

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: Release-Artifacts
          path: |
            ${{github.workspace}}/*.zip
          retention-days: 7
